version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: verdanist-postgres
    environment:
      POSTGRES_DB: verdanist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: verdanist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: verdanist-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_logs:
